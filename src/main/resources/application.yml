management:
  endpoints:
    web:
      exposure:
        include: 'info, health, prometheus'
      base-path: /admin
  prometheus:
    metrics:
      export:
        enabled: ${ENABLE_PROMETHEUS:true}

spring:
  application:
    name: helper-bot
    description: "REST API for helper-bot"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:token}

---
spring:
  config:
    activate:
      on-profile: proxy

proxy:
  host: ${PROXY_HOST:host}
  port: ${PROXY_PORT:port}
  user: ${PROXY_USER:user}
  password: ${PROXY_PASSWORD:password}

---
spring:
  config:
    activate:
      on-profile: local

telegram:
  bot:
    token: token

---
spring:
  config:
    activate:
      on-profile: test

telegram:
  bot:
    token: token
